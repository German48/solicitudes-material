<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Solicitudes de Material — FP</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#2563eb" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="header-titles">
        <h1>📦 Solicitudes de Material</h1>
        <p class="subtitulo">Departamento de Formación Profesional</p>
      </div>
      <button id="theme-toggle" class="theme-toggle" aria-label="Cambiar modo">
        <span id="theme-icon">🌙</span>
      </button>
    </div>
  </header>

  <main>
    <!-- Banner instalación PWA -->
    <div id="pwa-install-banner" class="pwa-banner" role="banner" style="display:none;">
      <span id="pwa-banner-text"></span>
      <button id="pwa-install-btn" class="pwa-banner-btn" style="display:none;">Instalar</button>
      <button id="pwa-banner-close" class="pwa-banner-close" aria-label="Cerrar">✕</button>
    </div>

    <!-- Formulario -->
    <section class="card" id="seccion-formulario">
      <h2>Nueva Solicitud</h2>
      <form id="form-solicitud" autocomplete="off">

        <div class="form-grid">
          <div class="campo">
            <label for="fecha">Fecha *</label>
            <input type="date" id="fecha" required />
          </div>

          <div class="campo">
            <label for="docente">Docente *</label>
            <select id="docente" required>
              <option value="">Seleccionar docente...</option>
              <option value="Enrique">Enrique</option>
              <option value="Juan Carlos">Juan Carlos</option>
              <option value="Álvaro">Álvaro</option>
              <option value="Nico">Nico</option>
              <option value="Pepa">Pepa</option>
              <option value="Laura">Laura</option>
              <option value="Germán">Germán</option>
              <option value="Saskia">Saskia</option>
              <option value="Jonás">Jonás</option>
            </select>
          </div>

          <div class="campo">
            <label for="grupo">Grupo</label>
            <select id="grupo">
              <option value="">Seleccionar grupo...</option>
              <option value="1º CFGB">1º CFGB</option>
              <option value="2º CFGB">2º CFGB</option>
              <option value="1º CFGM">1º CFGM</option>
              <option value="2º CFGM">2º CFGM</option>
              <option value="1º CFGS">1º CFGS</option>
              <option value="2º CFGS">2º CFGS</option>
              <option value="Otro">Otro</option>
            </select>
          </div>

          <div class="campo">
            <label for="modulo">Módulo</label>
            <select id="modulo">
              <option value="">Seleccionar módulo...</option>
              <option value="DDR">DDR</option>
              <option value="DRP">DRP</option>
              <option value="GNE">GNE</option>
              <option value="RRC">RRC</option>
              <option value="SOJ">SOJ</option>
              <option value="ABD">ABD</option>
              <option value="DHI">DHI</option>
              <option value="DJK">DJK</option>
              <option value="MLU">MLU</option>
              <option value="PXE">PXE</option>
              <option value="A10">A10</option>
              <option value="MC4">MC4</option>
              <option value="OAA">OAA</option>
              <option value="PVW">PVW</option>
              <option value="DCU">DCU</option>
              <option value="MRN">MRN</option>
              <option value="PUB">PUB</option>
              <option value="SOV">SOV</option>
              <option value="ATZ">ATZ</option>
              <option value="EB1">EB1</option>
              <option value="PMB">PMB</option>
              <option value="AAD">AAD</option>
              <option value="MCR">MCR</option>
              <option value="OPP">OPP</option>
              <option value="CDA">CDA</option>
              <option value="NCI">NCI</option>
              <option value="OPZ">OPZ</option>
              <option value="PZ1">PZ1</option>
              <option value="TUO">TUO</option>
              <option value="ILB">ILB</option>
              <option value="IUD">IUD</option>
              <option value="TPZ">TPZ</option>
              <option value="FAT">FAT</option>
              <option value="IYO">IYO</option>
              <option value="MJC">MJC</option>
              <option value="Departamento">Departamento</option>
            </select>
          </div>

          <div class="campo">
            <label for="nombre_proyecto">Nombre del Proyecto</label>
            <input type="text" id="nombre_proyecto" placeholder="Ej: App Móvil" />
          </div>

          <div class="campo">
            <label for="cantidad">Cantidad</label>
            <input type="number" id="cantidad" min="1" value="1" />
          </div>
        </div>

        <div class="form-grid">
          <div class="campo">
            <label for="estado">Estado</label>
            <select id="estado">
              <option value="Por comprar">Por comprar</option>
              <option value="Comprado">Comprado</option>
              <option value="Recibido">Recibido</option>
              <option value="Anulado">Anulado</option>
            </select>
          </div>
        </div>

        <div class="campo">
          <label for="material_solicitado">Material solicitado *</label>
          <textarea id="material_solicitado" required rows="2" placeholder="Describe el material que necesitas..."></textarea>
        </div>

        <div class="campo">
          <label for="descripcion_enlace">Descripción / Enlace</label>
          <input type="text" id="descripcion_enlace" placeholder="URL del producto, especificaciones..." />
        </div>

        <div class="campo">
          <label for="donde_comprar">¿Dónde comprar?</label>
          <input type="text" id="donde_comprar" placeholder="Ej: Ferretería Guanarteme" />
        </div>

        <div class="campo">
          <label for="comentarios">Comentarios</label>
          <textarea id="comentarios" rows="2" placeholder="Notas adicionales..."></textarea>
        </div>

        <div id="borrador-indicator" class="borrador-indicator"></div>
        <div id="mensaje-error" class="mensaje error"></div>
        <div id="mensaje-exito" class="mensaje exito"></div>

        <button type="submit" class="btn-enviar">Enviar Solicitud</button>
      </form>
    </section>

    <!-- Listado rápido -->
    <section class="card" id="seccion-listado">
      <div class="listado-header">
        <h2>Solicitudes</h2>
        <a href="solicitudes.html" class="btn-ver-todas">Ver todas →</a>
      </div>

      <div class="filtros">
        <div class="filtro-campo">
          <label for="filtro-estado">Filtrar por estado</label>
          <select id="filtro-estado">
            <option value="">Todas</option>
            <option value="Por comprar">Por comprar</option>
            <option value="Comprado">Comprado</option>
            <option value="Recibido">Recibido</option>
            <option value="Anulado">Anulado</option>
          </select>
        </div>
        <div class="filtro-campo">
          <label for="filtro-modulo">Filtrar por módulo</label>
          <select id="filtro-modulo">
            <option value="">Todos</option>
            <option value="DDR">DDR</option>
            <option value="DRP">DRP</option>
            <option value="GNE">GNE</option>
            <option value="RRC">RRC</option>
            <option value="SOJ">SOJ</option>
            <option value="ABD">ABD</option>
            <option value="DHI">DHI</option>
            <option value="DJK">DJK</option>
            <option value="MLU">MLU</option>
            <option value="PXE">PXE</option>
            <option value="A10">A10</option>
            <option value="MC4">MC4</option>
            <option value="OAA">OAA</option>
            <option value="PVW">PVW</option>
            <option value="DCU">DCU</option>
            <option value="MRN">MRN</option>
            <option value="PUB">PUB</option>
            <option value="SOV">SOV</option>
            <option value="ATZ">ATZ</option>
            <option value="EB1">EB1</option>
            <option value="PMB">PMB</option>
            <option value="AAD">AAD</option>
            <option value="MCR">MCR</option>
            <option value="OPP">OPP</option>
            <option value="CDA">CDA</option>
            <option value="NCI">NCI</option>
            <option value="OPZ">OPZ</option>
            <option value="PZ1">PZ1</option>
            <option value="TUO">TUO</option>
            <option value="ILB">ILB</option>
            <option value="IUD">IUD</option>
            <option value="TPZ">TPZ</option>
            <option value="FAT">FAT</option>
            <option value="IYO">IYO</option>
            <option value="MJC">MJC</option>
            <option value="Departamento">Departamento</option>
          </select>
        </div>
        <div class="filtro-campo filtro-buscador">
          <label for="buscador-global">Buscar</label>
          <input type="text" id="buscador-global" placeholder="Buscar en toda la solicitud..." />
        </div>
      </div>

      <div id="lista-solicitudes">
        <p class="vacio">Cargando...</p>
      </div>
    </section>
  </main>

  <footer>
    <p>Departamento de FP — PWA de Solicitudes de Material</p>
  </footer>

  <script type="module" src="app.js"></script>
</body>
</html>
