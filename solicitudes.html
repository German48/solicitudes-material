<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todas las Solicitudes — FP</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#2563eb" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="header-titles">
        <h1>📋 Todas las Solicitudes</h1>
        <p class="subtitulo">Departamento de Formación Profesional</p>
      </div>
      <button id="theme-toggle" class="theme-toggle" aria-label="Cambiar modo">
        <span id="theme-icon">🌙</span>
      </button>
    </div>
  </header>

  <main>
    <section class="card solicitudes-page">
      <a href="index.html" class="btn-nueva">← Nueva solicitud</a>

      <div class="filtros-tabla">
        <div class="filtro-campo">
          <label for="filtro-urgencia">Filtrar por urgencia</label>
          <select id="filtro-urgencia">
            <option value="">Todas</option>
            <option value="Normal">Normal</option>
            <option value="Pronto">Pronto</option>
            <option value="Urgente">Urgente</option>
          </select>
        </div>
        <div class="filtro-campo">
          <label for="filtro-modulo">Filtrar por módulo</label>
          <input type="text" id="filtro-modulo" placeholder="Nombre del módulo..." />
        </div>
      </div>

      <!-- Tabla en desktop -->
      <div class="table-wrapper">
        <table id="tabla-solicitudes">
          <thead>
            <tr>
              <th>Fecha</th>
              <th>Profesor/a</th>
              <th>Grupo</th>
              <th>Curso</th>
              <th>Módulo</th>
              <th>Material</th>
              <th>Cant.</th>
              <th>Urgencia</th>
              <th>Proyecto</th>
            </tr>
          </thead>
          <tbody id="tbody-solicitudes">
            <tr><td colspan="9" class="vacio">Cargando…</td></tr>
          </tbody>
        </table>
      </div>

      <!-- Cards en móvil -->
      <div id="solicitudes-cards" class="solicitudes-cards"></div>
    </section>
  </main>

  <footer>
    <p>Departamento de FP — PWA de Solicitudes de Material</p>
  </footer>

  <script type="module" src="app.js"></script>
  <script>
    // ——— Theme toggle (standalone for solicitudes.html) ———
    const themeToggle = document.getElementById('theme-toggle');
    const themeIcon = document.getElementById('theme-icon');

    function applyTheme(dark) {
      document.body.classList.toggle('dark', dark);
      themeIcon.textContent = dark ? '☀️' : '🌙';
      localStorage.setItem('theme', dark ? 'dark' : 'light');
    }

    (function initTheme() {
      const saved = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      applyTheme(saved === 'dark' || (!saved && prefersDark));
    })();

    themeToggle.addEventListener('click', () => {
      applyTheme(!document.body.classList.contains('dark'));
    });

    // ——— Tabla logic ———
    const tbody = document.getElementById('tbody-solicitudes');
    const cardsContainer = document.getElementById('solicitudes-cards');
    const filtroUrgencia = document.getElementById('filtro-urgencia');
    const filtroModulo = document.getElementById('filtro-modulo');

    const coloresUrgencia = { Normal: '#22c55e', Pronto: '#f97316', Urgente: '#ef4444' };

    function urgencyDot(urgencia) {
      const color = coloresUrgencia[urgencia] || '#6b7280';
      return `<span class="urgency-dot ${urgencia}" style="background:${color}"></span>${urgencia}`;
    }

    function renderTable(solicitudes) {
      // Tabla
      if (!solicitudes.length) {
        tbody.innerHTML = '<tr><td colspan="9" class="vacio">No hay solicitudes.</td></tr>';
        cardsContainer.innerHTML = '<p class="vacio">No hay solicitudes.</p>';
        return;
      }

      tbody.innerHTML = solicitudes.map(s => `
        <tr>
          <td>${s.fecha}</td>
          <td>${s.nombre_profesor}</td>
          <td>${s.grupo || '-'}</td>
          <td>${s.curso || '-'}</td>
          <td>${s.modulo || '-'}</td>
          <td>${s.material_solicitado}</td>
          <td>${s.cantidad}</td>
          <td>${urgencyDot(s.urgencia)}</td>
          <td>${s.nombre_proyecto || '-'}</td>
        </tr>
      `).join('');

      // Cards móvil
      cardsContainer.innerHTML = solicitudes.map(s => `
        <div class="soli-card" data-urgencia="${s.urgencia}">
          <div class="soli-card-header">
            <strong>${s.nombre_profesor}</strong>
            ${urgencyDot(s.urgencia)}
          </div>
          <div class="soli-card-row"><span>Fecha:</span><strong>${s.fecha}</strong></div>
          <div class="soli-card-row"><span>Grupo:</span><strong>${s.grupo || '-'}</strong></div>
          <div class="soli-card-row"><span>Curso:</span><strong>${s.curso || '-'}</strong></div>
          <div class="soli-card-row"><span>Módulo:</span><strong>${s.modulo || '-'}</strong></div>
          <div class="soli-card-row"><span>Proyecto:</span><strong>${s.nombre_proyecto || '-'}</strong></div>
          <div class="soli-card-row"><span>Material:</span><strong>${s.material_solicitado}</strong></div>
          <div class="soli-card-row"><span>Cantidad:</span><strong>${s.cantidad}</strong></div>
        </div>
      `).join('');
    }

    async function cargarTabla() {
      try {
        const { getSolicitudes } = await import('./supabase.js');
        const datos = await getSolicitudes(filtroUrgencia.value, filtroModulo.value);
        renderTable(datos);
      } catch (e) {
        tbody.innerHTML = `<tr><td colspan="9" class="vacio">Error: ${e.message}</td></tr>`;
      }
    }

    function debounce(fn, ms) {
      let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); };
    }

    filtroUrgencia.addEventListener('change', cargarTabla);
    filtroModulo.addEventListener('input', debounce(cargarTabla, 400));

    cargarTabla();

    // Registrar SW
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>
</body>
</html>
